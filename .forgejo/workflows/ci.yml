name: ci

# CI do GusEngine (pos repivot C++/SDL3, ADR-008).
# Escopo: build + testes da engine nova em GusEngine/. NAO toca game/ nem engine/
# (base Godot/C#, congelada como referencia). Sem deploy.
#
# Runner: codeberg-medium (global, estavel). NAO usar runs-on: docker (runner
# individual claudio fica offline por dias). codeberg-small (4 GB / 5 min) e
# insuficiente para compilar SDL3 do fonte + C++20 + Catch2.
# Container: ghcr.io/catthehacker/ubuntu:act-latest (compat actions/setup-*).
#
# STACK (ADR-008): SDL3 + RmlUi + Catch2 entram via FetchContent (pin de tag,
# compilados do fonte) - nao ha mais aqtinstall/Qt. As deps de BUILD do SDL (libs
# de dev X11/Wayland/GL) sao instaladas por apt; o resto o FetchContent resolve.
#
# PRE-REQUISITO no Codeberg: habilitar a unidade "Actions" em
# Settings > Repository do repo (nao vem ligada por default).

on:
  push:
    branches: [main]
    paths:
      - 'GusEngine/**'
      - '.forgejo/workflows/ci.yml'
  pull_request:
    paths:
      - 'GusEngine/**'
      - '.forgejo/workflows/ci.yml'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux (gcc, Release)
    runs-on: codeberg-medium
    container:
      image: ghcr.io/catthehacker/ubuntu:act-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Toolchain de build + deps de DESENVOLVIMENTO do SDL3. O SDL3 e compilado do
      # fonte (FetchContent), entao precisa dos -dev de X11/Wayland/GL/xkb. Lista
      # derivada do README-linux do SDL3 (build dependencies). Sem isto, o configure
      # do SDL quebra pedindo XCURSOR/XTEST/etc.
      - name: Install toolchain + SDL build deps
        run: |
          set -eux
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            cmake ninja-build g++ build-essential git \
            python3 python3-pip python3-venv \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxfixes-dev libxss-dev libxtst-dev \
            libxkbcommon-dev libwayland-dev wayland-protocols libdecor-0-dev \
            libgl1-mesa-dev libegl1-mesa-dev libdrm-dev libgbm-dev \
            libpulse-dev libasound2-dev libdbus-1-3

      # Gate de arquitetura (invariante ADR-008 + ADR-009 + ADR-010 F3): core/ e domain/
      # sao POCO puro e NAO podem incluir Qt, SDL, RmlUi NEM glintfx (nem vazar os
      # namespaces Rml::/glintfx::). Falha o CI cedo, antes de gastar build, se algo vazar
      # para essas camadas. Sincronizado com tools/check.sh (GATE arch).
      - name: Architecture gate (no Qt/SDL/RmlUi/glintfx in core/domain)
        run: |
          set -eu
          if grep -rnE '#[[:space:]]*include[[:space:]]*<(Q[A-Za-z]|SDL|RmlUi|glintfx)' \
               GusEngine/core GusEngine/domain; then
            echo "::error::include de Qt, SDL, RmlUi ou glintfx encontrado em core/ ou domain/ (POCO)."
            echo "core/ e domain/ devem ser headless. Mover para platform/ ou app/."
            exit 1
          fi
          if grep -rnE '\b(Rml|glintfx)::' GusEngine/core GusEngine/domain; then
            echo "::error::namespace Rml:: ou glintfx:: encontrado em core/ ou domain/ (POCO)."
            exit 1
          fi
          echo "OK: nenhum include/namespace Qt/SDL/RmlUi/glintfx em core/ ou domain/."

      # Cache dos fontes de FetchContent (_deps: SDL3, RmlUi, Catch2). Evita
      # re-clonar a cada run. Chave amarrada ao CMakeLists (onde os pins vivem).
      - name: Cache FetchContent deps
        uses: actions/cache@v4
        with:
          path: GusEngine/build/linux-release/_deps
          key: deps-${{ hashFiles('GusEngine/CMakeLists.txt') }}

      - name: Configure
        working-directory: GusEngine
        run: cmake --preset linux-release

      - name: Build
        working-directory: GusEngine
        run: cmake --build --preset linux-release

      - name: Test
        working-directory: GusEngine
        run: ctest --preset linux-release

      # Smoke headless: o app roda N ticks + 1 render offscreen com os drivers DUMMY
      # do SDL (sem display/audio no runner) e sai 0. timeout como cinto de
      # seguranca (mesma logica do tools/check.sh): se travar, falha rapido em vez
      # de pendurar o job.
      - name: Smoke (headless, SDL dummy)
        working-directory: GusEngine
        run: |
          set -eux
          SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy \
            timeout 60 ./build/linux-release/app/gusworld_app --smoke

      # Gate de paridade i18n (tools/i18n_parity.py): mesma checagem estrutural do
      # tools/check.sh (estagio GATE). Reprova em chave faltando/extra/duplicada;
      # cobertura de conteudo (%) so e exibida, nao reprova (en_intl e debito
      # deliberado ate pos-v1.0.0, CUT.9).
      - name: i18n parity gate
        run: python3 tools/i18n_parity.py

  asan:
    name: ASan/UBSan (core+domain+app)
    runs-on: codeberg-medium
    container:
      image: ghcr.io/catthehacker/ubuntu:act-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain + SDL build deps
        run: |
          set -eux
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            cmake ninja-build g++ build-essential git \
            python3 python3-pip python3-venv \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxfixes-dev libxss-dev libxtst-dev \
            libxkbcommon-dev libwayland-dev wayland-protocols libdecor-0-dev \
            libgl1-mesa-dev libegl1-mesa-dev libdrm-dev libgbm-dev \
            libpulse-dev libasound2-dev libdbus-1-3

      - name: Cache FetchContent deps (asan)
        uses: actions/cache@v4
        with:
          path: GusEngine/build/asan/_deps
          key: deps-asan-${{ hashFiles('GusEngine/CMakeLists.txt') }}

      # Build dir proprio (fora dos presets do CMakePresets.json): Debug +
      # -fsanitize=address,undefined, mesma parametrizacao usada localmente no
      # dossie AUDIT-M7-COSTURA (foi o ASan local que achou o AUD-MINIAUDIO-UAF).
      - name: Configure (ASan/UBSan)
        run: |
          cmake -S GusEngine -B GusEngine/build/asan -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -g" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build (ASan/UBSan)
        run: cmake --build GusEngine/build/asan

      - name: Test core/ under ASan/UBSan
        run: |
          set -eux
          ASAN_OPTIONS=detect_leaks=1 UBSAN_OPTIONS=print_stacktrace=1,halt_on_error=1 \
            ./GusEngine/build/asan/tests/gusengine_core_tests

      - name: Test domain/ under ASan/UBSan
        run: |
          set -eux
          ASAN_OPTIONS=detect_leaks=1 UBSAN_OPTIONS=print_stacktrace=1,halt_on_error=1 \
            ./GusEngine/build/asan/domain/tests/gusengine_domain_tests

      # AUD-MINIAUDIO-UAF (fechado 2026-07-10, commit 317a2e9): patch cirurgico no
      # miniaudio vendorizado eliminou o heap-use-after-free que abortava esta suite
      # sob ASan. AUD-MINIAUDIO-ALSA-LEAK (fechado 2026-07-10): o leak restante
      # (~17KB/18 allocs em ma_context_open_pcm__alsa, device ALSA real aberto no
      # ctor do AudioEngine) e do libasound (nao do GusWorld) - suprimido via
      # tools/lsan.supp (suppression ESTREITA, ver comentarios do arquivo + prova de
      # estreiteza por mutation testing). LSAN_OPTIONS aponta pro arquivo de
      # suppression (caminho relativo a raiz do repo, cwd do job).
      - name: Test platform/ under ASan/UBSan
        run: |
          set -eux
          ASAN_OPTIONS=detect_leaks=1 UBSAN_OPTIONS=print_stacktrace=1,halt_on_error=1 \
            LSAN_OPTIONS=suppressions=tools/lsan.supp \
            ./GusEngine/build/asan/platform/tests/gusengine_platform_tests

      # APP-ASAN-RMLUI-UBSAN (fechado 2026-07-10, commit ae10d61): patch vendorizado
      # (glintfx v0.9.1/rmlui-2cd28864-teardown-ub.patch) eliminou o UB de teardown do
      # RmlUi (vptr findings = 0). O leak residual (~6.5-6.8KB/153 allocs, one-time na
      # criacao do 1o contexto GL, driver GLVND/EGL - libEGL_nvidia.so.LoadVendors
      # neste host de dev) NAO se reproduz no CONTAINER real do CI: reproduzido
      # byte-a-byte via `docker run ghcr.io/catthehacker/ubuntu:act-latest` (mesma
      # imagem deste job) SEM Xvfb/DISPLAY/dev-dri (== ambiente real deste job) - o
      # unico teste que abre GL real (save_load_menu_interaction_test.cpp) degrada
      # GRACIOSAMENTE (SDL nao acha X11/Wayland/kmsdrm; "assertions: - none -" nos 4
      # TEST_CASE do harness) e a suite fecha 0 leaks, exit 0 (4428 assertions/650
      # test cases). LSAN_OPTIONS aqui e defensivo/consistente com o step platform/
      # (mesmo arquivo de suppression, hoje so cobre AUD-MINIAUDIO-ALSA-LEAK) - NAO
      # foi adicionada nenhuma linha nova a tools/lsan.supp pro leak GL/EGL porque ele
      # nao ocorre nas condicoes reais deste job (nao ha frame real de CI pra provar
      # um match estreito contra).
      - name: Test app/ under ASan/UBSan
        run: |
          set -eux
          ASAN_OPTIONS=detect_leaks=1 UBSAN_OPTIONS=print_stacktrace=1,halt_on_error=1 \
            LSAN_OPTIONS=suppressions=tools/lsan.supp \
            ./GusEngine/build/asan/app/tests/gusengine_app_tests

