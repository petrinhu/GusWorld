name: windows

# CI Windows REAL do GusEngine (WIN-CROSS-VALIDATE, exceção pontual autorizada pelo
# líder 2026-07-14): roda em windows-latest (MSVC nativo, Nível 3 de validação),
# completando a prova de MinGW cross-compile já feita em .forgejo/workflows/ci.yml
# (tools/winbuild_container.sh). Repo local é Codeberg-first; este workflow existe
# SÓ no espelho GitHub (petrinhu/GusWorld), porque Codeberg não oferece runner
# Windows global. NÃO duplicar/promover esta exceção sem nova autorização.
#
# MATRIZ HONESTA (todos REQUERIDOS desde glintfx v0.9.2, 2026-07-14):
#   core/domain/platform: provados cross-compiláveis sob MinGW-w64
#   (WIN-CROSS-VALIDATE, TODO.md); esta CI valida a MESMA prova sob MSVC real.
#   app/: destravado pelo glintfx v0.9.2 — o gl_loader.c gerado ganhou o branch
#   Windows (wglGetProcAddress + fallback GetProcAddress(opengl32.dll)), então
#   o app/ (que linka glintfx + RmlUi + GL) compila e linka no Windows real.
#   O antigo continue-on-error do app/ foi REMOVIDO: falha aqui bloqueia o job.
#   glintfx segue consumido via FetchContent, nunca patchado neste repo
#   (ver [[feedback_glintfx_nao_mexer_so_pedir]]).

on:
  push:
    branches: [main]
    paths:
      - 'GusEngine/**'
      - '.github/workflows/windows.yml'
  pull_request:
    paths:
      - 'GusEngine/**'
      - '.github/workflows/windows.yml'
  workflow_dispatch: {}

concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  windows:
    name: Windows (MSVC, Release)
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC dev environment (cl.exe no PATH)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Ensure Ninja
        shell: pwsh
        run: |
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja -y
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
          ninja --version

      # windows-latest traz vcpkg pre-instalado em C:\vcpkg (VCPKG_INSTALLATION_ROOT).
      # FreeType via vcpkg (nao FetchContent): RmlUi usa find_package(Freetype), e o
      # RmlUi_Include_GL3.h (loader glad de platform/) so PRECISA de RmlUi::RmlUi (que
      # arrasta Freetype) porque RMLUI_FONT_ENGINE=freetype (ver GusEngine/CMakeLists.txt).
      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-freetype-x64-windows-${{ runner.os }}-v1

      - name: Install FreeType via vcpkg
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install freetype:x64-windows
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # Cache dos fontes de FetchContent (_deps: SDL3, RmlUi, Catch2, glintfx). Evita
      # re-clonar a cada run. Chave amarrada ao CMakeLists (onde os pins vivem), mesmo
      # padrao do job "linux" em .forgejo/workflows/ci.yml.
      - name: Cache FetchContent deps
        uses: actions/cache@v4
        with:
          path: GusEngine\build\windows-release\_deps
          key: deps-windows-${{ hashFiles('GusEngine/CMakeLists.txt') }}

      - name: Configure (CMake preset windows-release, MSVC + vcpkg FreeType)
        shell: pwsh
        working-directory: GusEngine
        run: |
          cmake --preset windows-release `
            "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" `
            "-DVCPKG_TARGET_TRIPLET=x64-windows"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # --- REQUERIDOS: core/domain/platform (build por --target evita tocar app/ e,
      #     com isso, evita compilar glintfx nesta fase) ---

      - name: Build + test core/
        shell: pwsh
        working-directory: GusEngine
        run: |
          cmake --build --preset windows-release --target gusengine_core_tests
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          .\build\windows-release\tests\gusengine_core_tests.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build + test domain/
        shell: pwsh
        working-directory: GusEngine
        run: |
          cmake --build --preset windows-release --target gusengine_domain_tests
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          .\build\windows-release\domain\tests\gusengine_domain_tests.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build + test platform/
        shell: pwsh
        working-directory: GusEngine
        run: |
          cmake --build --preset windows-release --target gusengine_platform_tests
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          .\build\windows-release\platform\tests\gusengine_platform_tests.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # --- app/ (o jogo, linka glintfx + RmlUi + GL) ---
      # REQUIRED desde glintfx v0.9.2 (2026-07-14): o gl_loader.c ganhou o branch
      # Windows (wglGetProcAddress + fallback GetProcAddress(opengl32.dll)), entao o
      # app/ compila e linka no Windows real. O antigo continue-on-error (bloqueador
      # do gl_loader POSIX) foi REMOVIDO - agora falha aqui bloqueia o job, como deve.
      - name: Build app/ (compila+linka no Windows, glintfx v0.9.2)
        shell: pwsh
        working-directory: GusEngine
        run: |
          cmake --build --preset windows-release --target gusworld_app
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
